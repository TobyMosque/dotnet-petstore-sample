services:
  backend:
    build:
      target: build
    volumes:
      - ./backend:/src
    working_dir: /src/src/api
    command: dotnet watch run --no-launch-profile
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_HTTP_PORTS: "8080"

  docs:
    build:
      target: source-stage
    environment:
      CI: "true"
    volumes:
      - ./docs:/src
      - /src/node_modules
    command: /bin/sh -c "pnpm i && pnpm run dev --host 0.0.0.0 --port 4000"
    ports:
      - "4000:4000"
